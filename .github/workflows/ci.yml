name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref (saves minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default.
permissions:
  contents: read

env:
  NODE_VERSION: "20"
  NPM_VERSION: "11.7.0" # match the npm that generated package-lock.json (reproducible ci)

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pin npm to lockfile generator
        run: npm i -g npm@${{ env.NPM_VERSION }}

      - name: Install (clean, lockfile-exact)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Dummy values so env validation + `next build` succeed without secrets.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          JWT_SECRET: ci-dummy-secret
          JWT_REFRESH_SECRET: ci-dummy-refresh-secret

  integration:
    name: Migrations + Event-flow + RLS (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ferp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ferp_test
      JWT_SECRET: ci-dummy-secret
      JWT_REFRESH_SECRET: ci-dummy-refresh-secret
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pin npm to lockfile generator
        run: npm i -g npm@${{ env.NPM_VERSION }}

      - name: Install
        run: npm ci

      - name: Apply migrations to real Postgres
        run: npm run db:migrate

      - name: Core test — auth (register/login/refresh) + JWT + RBAC + branch CRUD
        run: npm run test:core

      - name: Sales test — product + manual sale → event → P&L + RBAC + audit
        run: npm run test:sales

      - name: Daily-closing test — reconciliation + persistence + idempotency
        run: npm run test:daily

      - name: Fixed-cost test — add/upsert/total/remove
        run: npm run test:fixed

      - name: Report test — daily net + monthly profit (fixed cost)
        run: npm run test:report

      - name: Branch test — multi-branch isolation
        run: npm run test:branch

      - name: Expenses test — category breakdown
        run: npm run test:expenses

      - name: Withdrawal test — per-person owner drawings
        run: npm run test:withdrawal

      - name: Category test — expense category normalization
        run: npm run test:category

      - name: Parser test — structured /closing text (100% accurate path)
        run: npm run test:parser

      - name: Smoke test — sale → stock → P&L + idempotency + RLS isolation
        run: npm run test:smoke

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [quality, integration]
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ]; then
            echo "❌ A required job failed — blocking merge."
            exit 1
          fi
          echo "✅ All required checks passed."
