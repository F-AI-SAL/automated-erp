version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps into one PR to cut noise.
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]
    # npm majors are breaking (framework/tooling migrations) — we adopt them
    # deliberately, not via bot. Minor + patch still flow (grouped above).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["ci", "dependencies"]
